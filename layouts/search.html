{{ define "main" }}
<div class="standalone-layout">
  <section class="page-card search-page">
    <p class="page-kicker">FULL TEXT SEARCH</p>
    <h2 class="page-title">站内搜索</h2>
    <div class="search-box"><span>⌕</span><input id="search-input" type="search" autocomplete="off" placeholder="搜索标题、正文、分类或标签…" aria-label="搜索关键词"><kbd>ESC</kbd></div>
    <p id="search-count" class="result-count">输入关键词开始搜索</p>
    <div id="search-results" class="search-results-page"><div class="empty">支持搜索全部文章正文。</div></div>
  </section>
</div>
{{ end }}
