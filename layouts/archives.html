{{ define "main" }}
{{- $pages := (where site.RegularPages "Section" "posts").ByDate.Reverse -}}
<div class="standalone-layout">
  <section class="page-card">
    <p class="page-kicker">共 {{ len $pages }} 篇文章</p>
    <h2 class="page-title">归档</h2>
    <div class="timeline">
      {{- range $pages }}
      <a href="{{ .RelPermalink }}"><time>{{ .Date.Format "2006-01-02" }}</time><span></span><div>{{ with .GetTerms "categories" }}<small>{{ (index . 0).LinkTitle }}</small>{{ end }}<strong>{{ .Title }}</strong></div></a>
      {{- end }}
    </div>
  </section>
</div>
{{ end }}
