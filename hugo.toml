baseURL = 'https://lizhengda0525-sudo.github.io/'
title = '学习笔记'
theme = 'PaperMod'

[params]
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false

[params.label]
  text = '学习笔记'

[params.cover]
  hidden = true

[languages.zh-cn]
  locale = 'zh-cn'
  label = '中文'
  weight = 1

[languages.zh-cn.menu]
  [[languages.zh-cn.menu.main]]
    name = '归档'
    url = '/archives/'
    weight = 1
  [[languages.zh-cn.menu.main]]
    name = '标签'
    url = '/tags/'
    weight = 2
  [[languages.zh-cn.menu.main]]
    name = '搜索'
    url = '/search/'
    weight = 3

[markup.highlight]
  lineNos = true
  style = 'monokai'
  anchorLineNos = false
  codeFences = true
  guessSyntax = true
  noClasses = false

[outputs]
  home = ['HTML', 'RSS', 'JSON']
